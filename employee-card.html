<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee ID Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f2f2;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:320px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.header{
    background:linear-gradient(to right, #0047ff, #0099ff);
    color:white;
    text-align:center;
    padding:20px 10px 80px;
}

.header h2{
    font-size:18px;
    line-height:1.4;
}

.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    border:4px solid #0078d7;
    margin:-55px auto 15px;
    object-fit:cover;
    display:block;
    background:white;
}

.details{
    padding:15px 20px;
}

.details table{
    width:100%;
    border-collapse:collapse;
}

.details td{
    font-size:14px;
    padding:6px 0;
    vertical-align:middle;
}

.details td:first-child{
    width:100px;
    font-weight:bold;
    color:#333;
}

.details td:last-child{
    color:#555;
}

.barcode{
    width:120px;
    height:40px;
    margin:20px auto;
    background:repeating-linear-gradient(
        90deg,
        #000 0px,
        #000 3px,
        #fff 3px,
        #fff 6px
    );
}

.footer{
    background:linear-gradient(to right,#0099ff,#00c6ff);
    height:25px;
}
</style>
</head>

<body>

<div class="card">

    <div class="header">
        <h2>AIventra Software Solution PVT LTD</h2>
    </div>

    <img src="Apeksha.jpeg" alt="Profile Photo" class="profile">

    <div class="details">
        <table>
            <tr>
                <td>Name</td>
                <td>: Apeksha Patil</td>
            </tr>
            <tr>
                <td>Designation</td>
                <td>: Frontend Developer</td>
            </tr>
            <tr>
                <td>ID No</td>
                <td>: 152</td>
            </tr>
            <tr>
                <td>Phone</td>
                <td>: 8073823361</td>
            </tr>
            <tr>
                <td>Email</td>
                <td>: apeksha18@gmail.com</td>
            </tr>
        </table>
    </div>

    <div class="barcode"></div>

    <div class="footer"></div>

</div>

</body>
</html>
