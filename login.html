<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form Using Flexbox</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200") no-repeat center center/cover;
}

.login-container{
    display:flex;
    flex-direction:column;
    width:350px;
    padding:25px;
    background:rgba(255,255,255,0.9);
    border-radius:10px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px;
    border:none;
    background:purple;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.options{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
    font-size:14px;
}

a{
    text-decoration:none;
    color:purple;
}
</style>
</head>

<body>

<div class="login-container">
    <h2>Account Login</h2>

    <input type="text" placeholder="Username" required>

    <input type="password" placeholder="Password" required>

    <button>LOGIN</button>

    <div class="options">
        <label>
            <input type="checkbox"> Remember Me
        </label>

        <a href="#">Forgot Password?</a>
    </div>
</div>

</body>
</html>
